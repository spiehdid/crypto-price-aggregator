registry:
  enabled: true
  refresh_interval: 1h
  chains:
    - ethereum
    - binance-smart-chain
    - polygon-pos
    - arbitrum-one
    - optimistic-ethereum
    - avalanche
    - base
    - solana
    - tron

telemetry:
  logs:
    enabled: true
    level: "info"
    format: "json"
  metrics:
    enabled: false
    exporter: "prometheus"
    port: 9090
  traces:
    enabled: false
    exporter: "otlp"
    endpoint: "localhost:4317"
    sample_rate: 1.0
