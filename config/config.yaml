server:
  host: "0.0.0.0"
  port: 8080
  read_timeout: 5s
  write_timeout: 10s
  admin_api_key: ""  # empty = auth disabled. Override via CPA_SERVER_ADMIN_API_KEY
  rate_limit:
    enabled: false
    requests_per_second: 10
    burst: 20
  cors:
    enabled: false
    allowed_origins: ["*"]
  force_https: false

pricing:
  default_currency: "usd"
  cache_ttl: 30s
  max_retries: 3
  store_history: true
  validation:
    enabled: true
    max_staleness: 5m
    max_deviation_percent: 5.0
    consensus_providers: 3
    consensus_min_providers: 2
    consensus_timeout: 3s
    response_mode: validated    # single | validated | consensus
    stablecoin_deviation: 2.0
    major_coin_deviation: 10.0
    altcoin_deviation: 20.0

polling:
  default_interval: 60s
  min_interval: 10s

storage:
  postgres:
    enabled: false
    dsn: "postgres://localhost:5432/cpa?sslmode=disable"
    max_conns: 20
    min_conns: 5
  redis:
    enabled: false
    addr: "localhost:6379"
    password: ""
    db: 0
  clickhouse:
    enabled: false
    addr: "localhost:9000"
    database: "cpa"
    username: "default"
    password: ""
    batch_size: 1000
    batch_interval: 5s

routing:
  strategy: smart
  allow_paid: false
  monthly_budget_usd: 0
  weights:
    rate_remaining: 0.4
    latency: 0.3
    cost: 0.3

providers:
